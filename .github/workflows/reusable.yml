name: Reusable Workflow

# This is a reusable workflow that can be called by other workflows
on:
  workflow_call:
    inputs:
      node-version:
        description: 'Node.js version to use'
        required: false
        default: '18'
        type: string
      
      run-build:
        description: 'Whether to run the build step'
        required: false
        default: true
        type: boolean
      
      artifact-name:
        description: 'Name for the build artifact'
        required: false
        default: 'build-artifact'
        type: string
    
    secrets:
      npm-token:
        description: 'NPM token for private packages'
        required: false
    
    outputs:
      test-status:
        description: 'Status of the test run'
        value: ${{ jobs.test-and-build.outputs.test-status }}
      
      build-version:
        description: 'Version of the build'
        value: ${{ jobs.test-and-build.outputs.build-version }}

jobs:
  test-and-build:
    name: Test and Build
    runs-on: ubuntu-latest
    outputs:
      test-status: ${{ steps.test.outputs.status }}
      build-version: ${{ steps.version.outputs.version }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: ${{ inputs.node-version }}
          cache: 'npm'
      
      - name: Configure NPM
        if: ${{ secrets.npm-token != '' }}
        run: |
          echo "//registry.npmjs.org/:_authToken=${{ secrets.npm-token }}" > ~/.npmrc
      
      - name: Install dependencies
        run: npm ci
      
      - name: Run linter
        run: npm run lint
      
      - name: Run tests
        id: test
        run: |
          npm test
          echo "status=success" >> $GITHUB_OUTPUT
      
      - name: Get version
        id: version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Build version: $VERSION"
      
      - name: Build application
        if: ${{ inputs.run-build }}
        run: npm run build
      
      - name: Upload build artifact
        if: ${{ inputs.run-build }}
        uses: actions/upload-artifact@v5
        with:
          name: ${{ inputs.artifact-name }}
          path: dist/
          retention-days: 7