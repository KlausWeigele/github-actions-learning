name: PR Checks

# Additional checks specifically for pull requests
on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  pr-info:
    name: PR Information
    runs-on: ubuntu-latest
    
    steps:
      - name: PR Details
        run: |
          echo "🔍 Pull Request Information"
          echo "=========================="
          echo "PR Number: #${{ github.event.pull_request.number }}"
          echo "PR Title: ${{ github.event.pull_request.title }}"
          echo "PR Author: ${{ github.event.pull_request.user.login }}"
          echo "Base Branch: ${{ github.event.pull_request.base.ref }}"
          echo "Head Branch: ${{ github.event.pull_request.head.ref }}"
          echo "Changed Files: ${{ github.event.pull_request.changed_files }}"

  size-label:
    name: Label PR Size
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Get PR size
        id: size
        uses: actions/github-script@v8
        with:
          script: |
            const pr = context.payload.pull_request;
            const size = pr.additions + pr.deletions;
            
            let label = '';
            if (size < 10) label = 'size/XS';
            else if (size < 50) label = 'size/S';
            else if (size < 150) label = 'size/M';
            else if (size < 500) label = 'size/L';
            else label = 'size/XL';
            
            // Remove existing size labels
            const labels = await github.rest.issues.listLabelsOnIssue({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr.number
            });
            
            for (const label of labels.data) {
              if (label.name.startsWith('size/')) {
                await github.rest.issues.removeLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: pr.number,
                  name: label.name
                });
              }
            }
            
            // Add new size label
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr.number,
              labels: [label]
            });
            
            return label;
      
      - name: Comment PR size
        uses: actions/github-script@v8
        with:
          script: |
            const size = '${{ steps.size.outputs.result }}';
            const comment = `## PR Size: ${size}
            
            This PR has been automatically labeled based on its size.
            - **XS**: < 10 lines
            - **S**: 10-49 lines  
            - **M**: 50-149 lines
            - **L**: 150-499 lines
            - **XL**: 500+ lines
            
            Large PRs are harder to review. Consider breaking them down if possible.`;
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });

  check-conflicts:
    name: Check for Conflicts
    runs-on: ubuntu-latest
    
    steps:
      - name: Check mergeable status
        uses: actions/github-script@v8
        with:
          script: |
            const pr = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number
            });
            
            if (pr.data.mergeable_state === 'conflicting') {
              core.setFailed('This PR has merge conflicts. Please resolve them.');
            }

  auto-assign:
    name: Auto Assign Reviewers
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    
    steps:
      - name: Auto assign
        uses: actions/github-script@v8
        with:
          script: |
            // In a real project, you might assign based on code ownership
            // For learning, we'll just log what would happen
            console.log('In a real project, this would auto-assign reviewers based on:');
            console.log('- CODEOWNERS file');
            console.log('- Files changed');
            console.log('- Team expertise');
            console.log('- Reviewer availability');