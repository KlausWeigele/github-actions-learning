name: Matrix Testing

# This workflow demonstrates matrix strategy for testing across multiple configurations
on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]

jobs:
  test-matrix:
    name: Test Node ${{ matrix.node-version }} on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    
    strategy:
      # Continue running other matrix jobs even if one fails
      fail-fast: false
      
      matrix:
        # Test on multiple operating systems
        os: [ubuntu-latest, windows-latest, macos-latest]
        
        # Test on multiple Node.js versions
        node-version: [16, 18, 20]
        
        # Include specific test configurations
        include:
          # Add a special test for Node 14 on Ubuntu only
          - os: ubuntu-latest
            node-version: 14
            experimental: true
          
          # Add coverage reporting only for Node 18 on Ubuntu
          - os: ubuntu-latest
            node-version: 18
            coverage: true
        
        # Exclude certain combinations
        exclude:
          # Don't test Node 16 on macOS
          - os: macos-latest
            node-version: 16
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v5
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
      
      - name: Display environment info
        run: |
          echo "Operating System: ${{ matrix.os }}"
          echo "Node.js version: ${{ matrix.node-version }}"
          echo "Experimental: ${{ matrix.experimental || false }}"
          node --version
          npm --version
      
      - name: Install dependencies
        run: npm ci
      
      - name: Run linter
        run: npm run lint
        # Continue even if linting fails on experimental versions
        continue-on-error: ${{ matrix.experimental || false }}
      
      - name: Run tests
        if: ${{ !matrix.coverage }}
        run: npm test
        continue-on-error: ${{ matrix.experimental || false }}
      
      - name: Run tests with coverage
        if: ${{ matrix.coverage }}
        run: npm test -- --coverage
      
      - name: Upload coverage report
        if: ${{ matrix.coverage }}
        uses: actions/upload-artifact@v3
        with:
          name: coverage-node-${{ matrix.node-version }}
          path: coverage/
      
      - name: Platform-specific tests
        run: |
          # Run platform-specific tests
          if [[ "${{ matrix.os }}" == "ubuntu-latest" ]]; then
            echo "Running Linux-specific tests..."
          elif [[ "${{ matrix.os }}" == "windows-latest" ]]; then
            echo "Running Windows-specific tests..."
          elif [[ "${{ matrix.os }}" == "macos-latest" ]]; then
            echo "Running macOS-specific tests..."
          fi
        shell: bash

  compatibility-report:
    name: Generate Compatibility Report
    needs: test-matrix
    runs-on: ubuntu-latest
    if: always()
    
    steps:
      - name: Generate compatibility matrix
        run: |
          echo "📊 Compatibility Matrix Report"
          echo "============================="
          echo ""
          echo "This workflow tested the application across:"
          echo "- Operating Systems: Ubuntu, Windows, macOS"
          echo "- Node.js versions: 14, 16, 18, 20"
          echo ""
          echo "Total configurations tested: 11"
          echo "(3 OS × 3 Node versions + 2 special cases - 1 exclusion)"
          echo ""
          echo "✅ Check the job summary for detailed results"

  browser-matrix:
    name: Browser Tests - ${{ matrix.browser }}
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        browser: [chrome, firefox, edge]
        include:
          - browser: chrome
            flags: '--no-sandbox'
          - browser: firefox
            flags: '-headless'
          - browser: edge
            flags: '--no-sandbox'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '18'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Run browser tests
        run: |
          echo "🌐 Running tests in ${{ matrix.browser }}..."
          echo "Browser flags: ${{ matrix.flags }}"
          # In a real scenario, you would run actual browser tests here
          # For example: npm run test:browser -- --browser=${{ matrix.browser }} ${{ matrix.flags }}
          echo "✅ ${{ matrix.browser }} tests passed!"